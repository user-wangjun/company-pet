<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./vite.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="./marketing-assets/marketing-morning.png" />
    <link rel="preload" as="image" href="./marketing-assets/marketing-morning-blink.png" />
    <link rel="preload" as="image" href="./marketing-assets/marketing-xiaoju-tail-clear.png" />
    <link rel="preload" as="image" href="./marketing-assets/marketing-xiaoju-tail.png" />
    <link rel="preload" as="image" href="./marketing-assets/wechat-qrcode.jpg" />
    <title>愈心桌宠</title>
    <style>
      :root {
        font-family:
          "Microsoft YaHei", Inter, Avenir, Helvetica, Arial, sans-serif;
        color: #25151b;
        background: #f8ecf1;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        user-select: none;
      }

      .marketing-page {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #f8ecf1;
      }

      .marketing-stage-shell {
        position: relative;
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
        margin: 12px;
        overflow: hidden;
        border: 2px solid #2c2024;
        border-radius: 12px;
        background: #ffffff;
        box-sizing: border-box;
        isolation: isolate;
      }

      .marketing-morning-art {
        position: absolute;
        z-index: 1;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        pointer-events: none;
        user-select: none;
      }

      .marketing-morning-blink-art {
        z-index: 4;
        opacity: 0;
        animation: marketing-xiaoju-blink 15s linear 2.4s infinite;
      }

      .marketing-xiaoju-tail-clear-art {
        z-index: 5;
      }

      .marketing-xiaoju-tail-art {
        z-index: 6;
        transform-origin: 31.8% 32.2%;
        animation: marketing-xiaoju-tail-sway 4.6s ease-in-out infinite;
        will-change: transform;
      }

      @keyframes marketing-xiaoju-blink {
        0%,
        93.8%,
        96.4%,
        100% {
          opacity: 0;
        }

        94.7%,
        95.4% {
          opacity: 1;
        }
      }

      @keyframes marketing-xiaoju-tail-sway {
        0%,
        100% {
          transform: rotate(-0.8deg);
        }

        45% {
          transform: rotate(1.8deg);
        }

        72% {
          transform: rotate(0.3deg);
        }
      }

      .marketing-cloud-surge {
        position: absolute;
        z-index: 2;
        left: -8%;
        right: -8%;
        bottom: -5%;
        height: 45%;
        overflow: hidden;
        pointer-events: none;
        opacity: 0.72;
        mix-blend-mode: screen;
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.18) 22%,
          rgba(0, 0, 0, 0.86) 48%,
          #000000 100%
        );
        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.18) 22%,
          rgba(0, 0, 0, 0.86) 48%,
          #000000 100%
        );
      }

      .marketing-cloud-surge-layer {
        position: absolute;
        display: block;
        border-radius: 48% 48% 0 0;
        background-repeat: repeat-x;
        background-size: 72% 100%;
        filter: blur(8px);
        transform-origin: center bottom;
        contain: paint;
        will-change: transform, opacity;
      }

      .marketing-cloud-surge-layer-a {
        inset: 7% -10% -20%;
        opacity: 0.58;
        background-image:
          radial-gradient(ellipse at 8% 72%, rgba(167, 153, 255, 0.55) 0 12%, transparent 31%),
          radial-gradient(ellipse at 23% 64%, rgba(255, 184, 232, 0.56) 0 15%, transparent 34%),
          radial-gradient(ellipse at 39% 74%, rgba(255, 230, 190, 0.42) 0 11%, transparent 28%),
          radial-gradient(ellipse at 56% 66%, rgba(194, 166, 255, 0.58) 0 16%, transparent 36%),
          radial-gradient(ellipse at 75% 72%, rgba(255, 188, 231, 0.5) 0 14%, transparent 34%),
          radial-gradient(ellipse at 92% 68%, rgba(255, 238, 198, 0.42) 0 11%, transparent 31%);
        opacity: var(--cloud-a-opacity, 0.58);
        transform: var(
          --cloud-a-transform,
          translate3d(-1.4%, 0.5%, 0) scale3d(1.05, 1.02, 1)
        );
      }

      .marketing-cloud-surge-layer-b {
        inset: 16% -13% -18%;
        opacity: 0.48;
        background-size: 64% 100%;
        background-image:
          radial-gradient(ellipse at 12% 68%, rgba(112, 132, 255, 0.4) 0 14%, transparent 34%),
          radial-gradient(ellipse at 31% 76%, rgba(216, 160, 255, 0.46) 0 17%, transparent 37%),
          radial-gradient(ellipse at 51% 66%, rgba(255, 210, 228, 0.42) 0 13%, transparent 31%),
          radial-gradient(ellipse at 70% 76%, rgba(145, 139, 255, 0.38) 0 16%, transparent 35%),
          radial-gradient(ellipse at 91% 70%, rgba(255, 222, 187, 0.34) 0 12%, transparent 30%);
        filter: blur(13px);
        opacity: var(--cloud-b-opacity, 0.46);
        transform: var(
          --cloud-b-transform,
          translate3d(1.8%, 0.9%, 0) scale3d(1.08, 1, 1)
        );
      }

      .marketing-cloud-surge-layer-c {
        inset: 31% -18% -18%;
        opacity: 0.34;
        background-size: 58% 100%;
        background-image:
          radial-gradient(ellipse at 6% 72%, rgba(255, 255, 255, 0.38) 0 10%, transparent 28%),
          radial-gradient(ellipse at 26% 70%, rgba(255, 178, 228, 0.3) 0 13%, transparent 31%),
          radial-gradient(ellipse at 48% 78%, rgba(156, 160, 255, 0.32) 0 15%, transparent 34%),
          radial-gradient(ellipse at 67% 70%, rgba(255, 242, 206, 0.32) 0 11%, transparent 28%),
          radial-gradient(ellipse at 88% 76%, rgba(202, 166, 255, 0.34) 0 15%, transparent 34%);
        filter: blur(18px);
        opacity: var(--cloud-c-opacity, 0.32);
        transform: var(
          --cloud-c-transform,
          translate3d(-0.8%, 0.6%, 0) scale3d(1.06, 1.05, 1)
        );
      }

      .marketing-morning-socials {
        position: absolute;
        z-index: 7;
        inset: 0;
        pointer-events: none;
      }

      .marketing-morning-hit {
        position: absolute;
        z-index: 7;
        display: block;
        border: 0;
        background: transparent;
        color: transparent;
        cursor: pointer;
        pointer-events: auto;
      }

      .marketing-morning-brand-hit {
        left: 1.7%;
        top: 2.2%;
        width: 16%;
        height: 7.3%;
      }

      .marketing-morning-discord,
      .marketing-morning-x,
      .marketing-morning-wechat,
      .marketing-morning-qq {
        top: 2.6%;
        width: 5.6%;
        height: 7.4%;
      }

      .marketing-morning-discord {
        left: 70.5%;
      }

      .marketing-morning-download {
        left: calc(70.5% - clamp(52px, 6.9%, 92px) - 8px);
        top: 2.9%;
        display: flex;
        width: clamp(52px, 6.9%, 92px);
        height: clamp(30px, 5.8%, 44px);
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 0 10px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        color: #2c2024;
        font-size: 14px;
        font-weight: 800;
        line-height: 1;
        box-shadow: 0 8px 18px rgba(44, 32, 36, 0.16);
        backdrop-filter: blur(8px);
        transition:
          background 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .marketing-morning-download:hover {
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 22px rgba(44, 32, 36, 0.2);
        transform: translateY(-1px);
      }

      .marketing-morning-download-label {
        pointer-events: none;
        white-space: nowrap;
      }

      .marketing-morning-x {
        left: 76%;
      }

      .marketing-morning-wechat {
        left: 81.5%;
      }

      .marketing-morning-qq {
        left: 87%;
      }

      .marketing-morning-user {
        left: 93%;
        top: 1.7%;
        width: 5.1%;
        height: 8.8%;
      }

      .marketing-morning-hit:focus-visible {
        outline: 2px solid rgba(239, 79, 126, 0.75);
        outline-offset: 2px;
        border-radius: 8px;
      }

      .marketing-wechat-popover {
        position: absolute;
        top: calc(100% + 12px);
        left: 50%;
        width: 170px;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        background: rgba(30, 30, 34, 0.96);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.34);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(8px) scale(0.94);
        transition:
          opacity 220ms ease,
          transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .marketing-wechat-popover img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 10px;
      }

      .marketing-wechat-popover-text {
        display: block;
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 12px;
        line-height: 1.2;
        text-align: center;
      }

      .marketing-morning-wechat:hover .marketing-wechat-popover,
      .marketing-morning-wechat.is-active .marketing-wechat-popover {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0) scale(1);
      }

      .marketing-toast {
        position: fixed;
        z-index: 30;
        top: 30px;
        left: 50%;
        padding: 11px 24px;
        border-radius: 8px;
        background: linear-gradient(135deg, #ef4f7e 0%, #ff6c8f 100%);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 15px 35px rgba(239, 79, 126, 0.35);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(-16px);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .marketing-toast.is-visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .marketing-screen-reader-text {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      @media (prefers-reduced-motion: reduce) {
        .marketing-morning-blink-art {
          opacity: 0 !important;
          animation: none !important;
          transform: none !important;
        }

        .marketing-xiaoju-tail-art {
          animation: none !important;
          transform: none !important;
        }

        .marketing-cloud-surge-layer {
          transform: none !important;
        }
      }

      @media (max-width: 700px) {
        .marketing-stage-shell {
          width: calc(100vw - 14px);
          height: calc(100vh - 14px);
          margin: 7px;
        }
      }

      /* ─── Download Confirmation Dialog ─── */

      .download-dialog-overlay {
        position: fixed;
        z-index: 100;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(7, 24, 93, 0.55);
        backdrop-filter: blur(6px);
        animation: download-overlay-fadein 220ms ease forwards;
      }

      @keyframes download-overlay-fadein {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .download-dialog {
        position: relative;
        width: min(420px, calc(100vw - 48px));
        box-sizing: border-box;
        padding: 36px 32px 28px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 20px;
        background: linear-gradient(
          168deg,
          rgba(255, 255, 255, 0.96) 0%,
          rgba(248, 236, 241, 0.98) 100%
        );
        box-shadow:
          0 24px 56px rgba(7, 24, 93, 0.28),
          0 6px 16px rgba(239, 79, 126, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
        text-align: center;
        animation: download-dialog-enter 320ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes download-dialog-enter {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.94);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .download-dialog-icon {
        font-size: 44px;
        line-height: 1;
        margin-bottom: 12px;
      }

      .download-dialog-title {
        margin: 0 0 12px;
        color: #2c2024;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.3;
      }

      .download-dialog-desc {
        margin: 0 0 24px;
        color: #5a4350;
        font-size: 14px;
        line-height: 1.65;
      }

      .download-dialog-desc strong {
        color: #ef4f7e;
        font-weight: 700;
      }

      .download-dialog-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .download-dialog-btn {
        min-width: 110px;
        min-height: 42px;
        padding: 0 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .download-dialog-btn-cancel {
        border: 1px solid rgba(44, 32, 36, 0.18);
        background: rgba(255, 255, 255, 0.82);
        color: #5a4350;
      }

      .download-dialog-btn-cancel:hover {
        background: rgba(248, 236, 241, 0.95);
        transform: translateY(-1px);
      }

      .download-dialog-btn-confirm {
        border: 1px solid rgba(239, 79, 126, 0.3);
        background: linear-gradient(135deg, #ef4f7e 0%, #ff6c8f 100%);
        color: #ffffff;
        box-shadow: 0 6px 18px rgba(239, 79, 126, 0.3);
      }

      .download-dialog-btn-confirm:hover {
        background: linear-gradient(135deg, #e8447a 0%, #fb5e84 100%);
        box-shadow: 0 8px 22px rgba(239, 79, 126, 0.4);
        transform: translateY(-1px);
      }

      .download-dialog-btn-confirm:focus-visible,
      .download-dialog-btn-cancel:focus-visible {
        outline: 2px solid rgba(239, 79, 126, 0.75);
        outline-offset: 2px;
      }

      .download-dialog-overlay.is-hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="marketing-page">
      <section class="marketing-stage-shell marketing-morning-shell" aria-label="愈心桌宠宣传首页">
        <img
          class="marketing-morning-art"
          src="./marketing-assets/marketing-morning.png"
          width="1672"
          height="941"
          alt=""
          aria-hidden="true"
          draggable="false"
        />
        <img
          class="marketing-morning-art marketing-morning-blink-art"
          src="./marketing-assets/marketing-morning-blink.png"
          width="1672"
          height="941"
          alt=""
          aria-hidden="true"
          draggable="false"
        />
        <img
          class="marketing-morning-art marketing-xiaoju-tail-clear-art"
          src="./marketing-assets/marketing-xiaoju-tail-clear.png"
          width="1672"
          height="941"
          alt=""
          aria-hidden="true"
          draggable="false"
        />
        <img
          class="marketing-morning-art marketing-xiaoju-tail-art"
          src="./marketing-assets/marketing-xiaoju-tail.png"

          aria-hidden="true"

        />

        <div class="marketing-cloud-surge" data-cloud-surge="active" aria-hidden="true">

          <span class="marketing-cloud-surge-layer marketing-cloud-surge-layer-c"></span>
        </div>

        <a class="marketing-morning-hit marketing-morning-brand-hit" href="./marketing.html" aria-label="愈心桌宠首页"></a>

        <nav class="marketing-morning-socials" aria-label="社交入口">
          <a class="marketing-morning-hit marketing-morning-discord" href="https://discord.gg/AEQqraAtER" target="_blank" rel="noopener noreferrer" aria-label="Discord" title="Discord"></a>
          <button class="marketing-morning-hit marketing-morning-download" type="button" aria-label="下载" title="下载 Windows 安装包" id="download-btn">
            <span class="marketing-morning-download-label">下载</span>
          </button>
          <button class="marketing-morning-hit marketing-morning-x" type="button" aria-label="X" title="X" data-toast-message="亟待展示"></button>

              <span class="marketing-wechat-popover-text">扫码加入微信群</span>
            </span>
          </button>
          <button class="marketing-morning-hit marketing-morning-qq" type="button" aria-label="QQ" title="QQ" data-toast-message="亟待展示"></button>
          <button class="marketing-morning-hit marketing-morning-user" type="button" aria-label="用户头像" title="用户头像" data-toast-message="亟待展示"></button>
        </nav>

        <div class="marketing-toast" role="status" aria-live="polite">亟待展示</div>
        <h1 class="marketing-screen-reader-text">愈心桌宠</h1>
        <p class="marketing-screen-reader-text">彩色星空主视觉</p>
        <p class="marketing-screen-reader-text">宇宙星球主视觉</p>
      </section>
    </main>

    <div class="download-dialog-overlay is-hidden" id="download-dialog-overlay" role="presentation">
      <div class="download-dialog" role="alertdialog" aria-modal="true" aria-labelledby="download-dialog-title" aria-describedby="download-dialog-desc">
        <div class="download-dialog-icon" aria-hidden="true">🖥️</div>
        <h2 id="download-dialog-title" class="download-dialog-title">下载 Windows 安装包</h2>
        <p id="download-dialog-desc" class="download-dialog-desc">愈心桌宠是一款轻量的桌面陪伴应用，让小橘、ds、ikun、蒜鸟在桌面上待机陪伴，支持点击、双击、拖拽和桌面图标互动，也会在合适的时候提醒你护眼、喝水、吃饭、睡觉。<br><br>此安装包仅适用于 <strong>Windows 系统（64位）</strong>。<br>请确认你的电脑是 Windows 操作系统后再下载。</p>
        <div class="download-dialog-actions">
          <button class="download-dialog-btn download-dialog-btn-cancel" type="button" id="download-cancel-btn">取消</button>
          <button class="download-dialog-btn download-dialog-btn-confirm" type="button" id="download-confirm-btn">确认，开始下载</button>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const shell = document.querySelector(".marketing-stage-shell");
        if (!shell) return;

        const createLayerTransform = ({ x, y, scaleX, scaleY }) =>
          `translate3d(${x.toFixed(3)}%, ${y.toFixed(3)}%, 0) scale3d(${scaleX.toFixed(3)}, ${scaleY.toFixed(3)}, 1)`;

        const setCloudSurgeFrame = (cloudSurge, elapsed) => {
          const a = Math.sin(elapsed * 0.62);
          const b = Math.cos(elapsed * 0.48);
          const c = Math.sin(elapsed * 0.38 + 1.4);

          cloudSurge.style.setProperty(
            "--cloud-a-transform",
            createLayerTransform({
              x: -1.4 + a * 2.6,
              y: 0.5 - b * 1.4,
              scaleX: 1.05 + b * 0.045,
              scaleY: 1.02 + a * 0.06,
            }),
          );
          cloudSurge.style.setProperty("--cloud-a-opacity", `${(0.58 + c * 0.08).toFixed(3)}`);

          cloudSurge.style.setProperty(
            "--cloud-b-transform",
            createLayerTransform({
              x: 1.8 - b * 3.1,
              y: 0.9 + a * 1.1,
              scaleX: 1.08 + a * 0.055,
              scaleY: 1.0 + c * 0.08,
            }),
          );
          cloudSurge.style.setProperty("--cloud-b-opacity", `${(0.46 + b * 0.07).toFixed(3)}`);

          cloudSurge.style.setProperty(
            "--cloud-c-transform",
            createLayerTransform({
              x: -0.8 + c * 2.2,
              y: 0.6 - a * 1.3,
              scaleX: 1.06 + c * 0.05,
              scaleY: 1.05 + b * 0.09,
            }),
          );
          cloudSurge.style.setProperty("--cloud-c-opacity", `${(0.32 + a * 0.06).toFixed(3)}`);
        };

        const cloudSurge = shell.querySelector(".marketing-cloud-surge");
        const prefersReducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches;
        if (cloudSurge && !prefersReducedMotion) {
          const startedAt = window.performance.now();
          const updateCloudSurge = () => {
            setCloudSurgeFrame(cloudSurge, (window.performance.now() - startedAt) / 1000);
            window.requestAnimationFrame(updateCloudSurge);
          };

          window.requestAnimationFrame(updateCloudSurge);
        }

        const wechatSocial = shell.querySelector(".marketing-morning-wechat");
        if (wechatSocial) {
          wechatSocial.addEventListener("click", (event) => {
            event.stopPropagation();
            wechatSocial.classList.toggle("is-active");
          });

          document.addEventListener("click", () => {
            wechatSocial.classList.remove("is-active");
          });
        }

        const toastEl = shell.querySelector(".marketing-toast");
        let toastTimer = 0;
        const showToast = (message = "亟待展示") => {
          if (!toastEl) return;
          toastEl.textContent = message;
          toastEl.classList.add("is-visible");
          window.clearTimeout(toastTimer);
          toastTimer = window.setTimeout(() => {
            toastEl.classList.remove("is-visible");
          }, 2200);
        };

        const pendingButtons = shell.querySelectorAll("[data-toast-message]");

        pendingButtons.forEach((button) => {
          if (!button) return;
          button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            showToast(button.getAttribute("data-toast-message") || "亟待展示");
          });
        });

        // Download confirmation dialog
        const WINDOWS_DOWNLOAD_URL = "../releases/愈心桌宠_0.2.3_x64-setup.exe";
        const downloadBtn = document.getElementById("download-btn");
        const downloadOverlay = document.getElementById("download-dialog-overlay");
        const downloadCancelBtn = document.getElementById("download-cancel-btn");
        const downloadConfirmBtn = document.getElementById("download-confirm-btn");

        const openDownloadDialog = () => {
          if (downloadOverlay) downloadOverlay.classList.remove("is-hidden");
        };

        const closeDownloadDialog = () => {
          if (downloadOverlay) downloadOverlay.classList.add("is-hidden");
        };

        if (downloadBtn) {
          downloadBtn.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            openDownloadDialog();
          });
        }

        if (downloadOverlay) {
          downloadOverlay.addEventListener("click", closeDownloadDialog);
          const dialog = downloadOverlay.querySelector(".download-dialog");
          if (dialog) {
            dialog.addEventListener("click", (event) => event.stopPropagation());
          }
        }

        if (downloadCancelBtn) {
          downloadCancelBtn.addEventListener("click", closeDownloadDialog);
        }

        if (downloadConfirmBtn) {
          downloadConfirmBtn.addEventListener("click", () => {
            closeDownloadDialog();
            window.open(WINDOWS_DOWNLOAD_URL, "_blank", "noopener,noreferrer");
          });
        }
      })();
    </script>
  </body>
</html>
