name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-x64:
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - run: npm ci

      - name: Verify tagged version
        shell: pwsh
        run: |
          @'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME ?? "";
          const errors = [];
          let expected = null;

          if (!tag) {
            errors.push("GITHUB_REF_NAME is missing.");
          } else if (!tag.startsWith("v")) {
            errors.push(`Tag name must start with v, got ${JSON.stringify(tag)}.`);
          } else {
            expected = tag.slice(1);
          }

          function readJsonVersion(file, label) {
            try {
              const data = JSON.parse(fs.readFileSync(file, "utf8"));
              if (typeof data.version !== "string" || data.version.trim() === "") {
                errors.push(`${label} is missing a non-empty string version.`);
                return null;
              }
              return data.version;
            } catch (error) {
              errors.push(`Failed to read ${label} from ${file}: ${error.message}`);
              return null;
            }
          }

          function readCargoVersion(file) {
            try {
              const cargoText = fs.readFileSync(file, "utf8");
              const cargoLines = cargoText.split(/\r?\n/);
              const packageHeaderIndex = cargoLines.findIndex((line) => /^\[package\]\s*(?:#.*)?$/.test(line.trim()));
              if (packageHeaderIndex < 0) {
                errors.push(`Could not find a [package] section in ${file}.`);
                return null;
              }
              let cargoVersion;
              for (const line of cargoLines.slice(packageHeaderIndex + 1)) {
                const trimmed = line.trim();
                if (/^\[.*\]\s*(?:#.*)?$/.test(trimmed)) {
                  break;
                }
                const match = trimmed.match(/^version\s*=\s*"([^"]+)"\s*(?:#.*)?$/);
                if (match) {
                  cargoVersion = match[1];
                  break;
                }
              }
              if (!cargoVersion) {
                errors.push(`Could not find [package].version in ${file}.`);
                return null;
              }
              return cargoVersion;
            } catch (error) {
              errors.push(`Failed to read Cargo version from ${file}: ${error.message}`);
              return null;
            }
          }

          const versions = [
            ["package.json", readJsonVersion("package.json", "package.json")],
            ["src-tauri/Cargo.toml", readCargoVersion("src-tauri/Cargo.toml")],
            ["src-tauri/tauri.conf.json", readJsonVersion("src-tauri/tauri.conf.json", "src-tauri/tauri.conf.json")],
          ];

          if (expected !== null) {
            for (const [label, version] of versions) {
              if (version !== expected) {
                errors.push(`${label} version ${JSON.stringify(version)} does not match tag version ${JSON.stringify(expected)}.`);
              }
            }
          }

          if (errors.length > 0) {
            console.error("Release version validation failed:");
            for (const error of errors) {
              console.error(`- ${error}`);
            }
            process.exit(1);
          }

          console.log(`Release version verified: ${expected}.`);
          '@ | node

      - run: npm run tauri -- build --bundles nsis

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  macos-arm64:
    permissions:
      contents: read
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Verify tagged version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME ?? "";
          const errors = [];
          let expected = null;

          if (!tag) {
            errors.push("GITHUB_REF_NAME is missing.");
          } else if (!tag.startsWith("v")) {
            errors.push(`Tag name must start with v, got ${JSON.stringify(tag)}.`);
          } else {
            expected = tag.slice(1);
          }

          function readJsonVersion(file, label) {
            try {
              const data = JSON.parse(fs.readFileSync(file, "utf8"));
              if (typeof data.version !== "string" || data.version.trim() === "") {
                errors.push(`${label} is missing a non-empty string version.`);
                return null;
              }
              return data.version;
            } catch (error) {
              errors.push(`Failed to read ${label} from ${file}: ${error.message}`);
              return null;
            }
          }

          function readCargoVersion(file) {
            try {
              const cargoText = fs.readFileSync(file, "utf8");
              const cargoLines = cargoText.split(/\r?\n/);
              const packageHeaderIndex = cargoLines.findIndex((line) => /^\[package\]\s*(?:#.*)?$/.test(line.trim()));
              if (packageHeaderIndex < 0) {
                errors.push(`Could not find a [package] section in ${file}.`);
                return null;
              }
              let cargoVersion;
              for (const line of cargoLines.slice(packageHeaderIndex + 1)) {
                const trimmed = line.trim();
                if (/^\[.*\]\s*(?:#.*)?$/.test(trimmed)) {
                  break;
                }
                const match = trimmed.match(/^version\s*=\s*"([^"]+)"\s*(?:#.*)?$/);
                if (match) {
                  cargoVersion = match[1];
                  break;
                }
              }
              if (!cargoVersion) {
                errors.push(`Could not find [package].version in ${file}.`);
                return null;
              }
              return cargoVersion;
            } catch (error) {
              errors.push(`Failed to read Cargo version from ${file}: ${error.message}`);
              return null;
            }
          }

          const versions = [
            ["package.json", readJsonVersion("package.json", "package.json")],
            ["src-tauri/Cargo.toml", readCargoVersion("src-tauri/Cargo.toml")],
            ["src-tauri/tauri.conf.json", readJsonVersion("src-tauri/tauri.conf.json", "src-tauri/tauri.conf.json")],
          ];

          if (expected !== null) {
            for (const [label, version] of versions) {
              if (version !== expected) {
                errors.push(`${label} version ${JSON.stringify(version)} does not match tag version ${JSON.stringify(expected)}.`);
              }
            }
          }

          if (errors.length > 0) {
            console.error("Release version validation failed:");
            for (const error of errors) {
              console.error(`- ${error}`);
            }
            process.exit(1);
          }

          console.log(`Release version verified: ${expected}.`);
          NODE

      - run: npm run tauri -- build --target aarch64-apple-darwin --bundles dmg
        env:
          APPLE_SIGNING_IDENTITY: "-"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - windows-x64
      - macos-arm64
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create draft release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' exes < <(find release-assets -type f -name '*.exe' -print0)
          mapfile -d '' dmgs < <(find release-assets -type f -name '*.dmg' -print0)

          if [ "${#exes[@]}" -ne 1 ]; then
            echo "Expected exactly one EXE installer, found ${#exes[@]}." >&2
            find release-assets -type f -name '*.exe' -print >&2
            exit 1
          fi

          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG installer, found ${#dmgs[@]}." >&2
            find release-assets -type f -name '*.dmg' -print >&2
            exit 1
          fi

          exe_file="${exes[0]}"
          dmg_file="${dmgs[0]}"

          if gh release view "$TAG_NAME" --json isDraft --jq .isDraft >/dev/null 2>&1; then
            if [ "$(gh release view "$TAG_NAME" --json isDraft --jq .isDraft)" != "true" ]; then
              echo "Release $TAG_NAME already exists and is published; refusing to overwrite it." >&2
              exit 1
            fi
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --draft \
              --title "愈心桌宠 $GITHUB_REF_NAME" \
              --notes "Temporary notes while CI uploads the desktop installers."
          fi

      - name: Upload installers and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' exes < <(find release-assets -type f -name '*.exe' -print0)
          mapfile -d '' dmgs < <(find release-assets -type f -name '*.dmg' -print0)

          if [ "${#exes[@]}" -ne 1 ]; then
            echo "Expected exactly one EXE installer, found ${#exes[@]}." >&2
            find release-assets -type f -name '*.exe' -print >&2
            exit 1
          fi

          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG installer, found ${#dmgs[@]}." >&2
            find release-assets -type f -name '*.dmg' -print >&2
            exit 1
          fi

          exe_file="${exes[0]}"
          dmg_file="${dmgs[0]}"
          existing_assets=()
          mapfile -t existing_assets < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')
          for asset in "${existing_assets[@]}"; do
            gh release delete-asset "$TAG_NAME" "$asset" --yes
          done

          gh release upload "$TAG_NAME" "$exe_file" "$dmg_file" --clobber

          remote_assets=()
          mapfile -t remote_assets < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')
          remote_exes=()
          remote_dmgs=()
          mapfile -t remote_exes < <(printf '%s\n' "${remote_assets[@]}" | grep -E '\.exe$' || true)
          mapfile -t remote_dmgs < <(printf '%s\n' "${remote_assets[@]}" | grep -E '\.dmg$' || true)

          if [ "${#remote_assets[@]}" -ne 2 ] || [ "${#remote_exes[@]}" -ne 1 ] || [ "${#remote_dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one remote EXE asset and one remote DMG asset." >&2
            echo "Actual release assets:" >&2
            printf '%s\n' "${remote_assets[@]}" >&2
            exit 1
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          cat > "$notes_file" <<'EOF'
          ## 产品介绍

          愈心桌宠是一款轻量的桌面陪伴应用。它把小橘、ds、ikun、蒜鸟等角色放到桌面上陪伴你，支持待机、点击、双击、拖拽、桌面图标互动，也会在合适的时候提醒你护眼、喝水、吃饭、睡觉。

          本版本统一了所有内置 pet 的基础交互流程，修复拖拽方向识别，并将检查更新改为右键双击后先确认、再打开 release 页面。

          ## 安装包说明

          - Windows x64 安装包：`.exe`
          - Apple Silicon 安装包：`.dmg`，支持 M1 / M2 / M3 / M4 以及后续 ARM64 Mac

          ## 安装提示

          当前构建不使用 Apple Developer ID 签名，仅使用免费的 ad-hoc（临时）签名，且未进行公证。首次启动时，如果 macOS 提示已阻止打开，请前往“系统设置 → 隐私与安全性”，点击“仍要打开”（Open Anyway）继续启动。

          ## 兼容性

          Intel Mac 不受支持。
          EOF

          gh release edit "$TAG_NAME" \
            --notes-file "$notes_file" \
            --draft=false \
            --latest
