name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Verify tagged version
        shell: pwsh
        run: |
          @'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME ?? "";
          const errors = [];
          let expected = null;

          if (!tag) {
            errors.push("GITHUB_REF_NAME is missing.");
          } else if (!tag.startsWith("v")) {
            errors.push(`Tag name must start with v, got ${JSON.stringify(tag)}.`);
          } else {
            expected = tag.slice(1);
          }

          function readJsonVersion(file, label) {
            try {
              const data = JSON.parse(fs.readFileSync(file, "utf8"));
              if (typeof data.version !== "string" || data.version.trim() === "") {
                errors.push(`${label} is missing a non-empty string version.`);
                return null;
              }
              return data.version;
            } catch (error) {
              errors.push(`Failed to read ${label} from ${file}: ${error.message}`);
              return null;
            }
          }

          function readCargoVersion(file) {
            try {
              const cargoText = fs.readFileSync(file, "utf8");
              const cargoLines = cargoText.split(/\r?\n/);
              const packageHeaderIndex = cargoLines.findIndex((line) => line.trim() === "[package]");
              if (packageHeaderIndex < 0) {
                errors.push(`Could not find a [package] section in ${file}.`);
                return null;
              }
              let cargoVersion;
              for (const line of cargoLines.slice(packageHeaderIndex + 1)) {
                const trimmed = line.trim();
                if (trimmed && trimmed.startsWith("[") && trimmed.endsWith("]")) {
                  break;
                }
                const match = trimmed.match(/^version\s*=\s*"([^"]+)"\s*$/);
                if (match) {
                  cargoVersion = match[1];
                  break;
                }
              }
              if (!cargoVersion) {
                errors.push(`Could not find [package].version in ${file}.`);
                return null;
              }
              return cargoVersion;
            } catch (error) {
              errors.push(`Failed to read Cargo version from ${file}: ${error.message}`);
              return null;
            }
          }

          const versions = [
            ["package.json", readJsonVersion("package.json", "package.json")],
            ["src-tauri/Cargo.toml", readCargoVersion("src-tauri/Cargo.toml")],
            ["src-tauri/tauri.conf.json", readJsonVersion("src-tauri/tauri.conf.json", "src-tauri/tauri.conf.json")],
          ];

          if (expected !== null) {
            for (const [label, version] of versions) {
              if (version !== expected) {
                errors.push(`${label} version ${JSON.stringify(version)} does not match tag version ${JSON.stringify(expected)}.`);
              }
            }
          }

          if (errors.length > 0) {
            console.error("Release version validation failed:");
            for (const error of errors) {
              console.error(`- ${error}`);
            }
            process.exit(1);
          }

          console.log(`Release version verified: ${expected}.`);
          '@ | node

      - run: npm run tauri -- build --bundles nsis

      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Verify tagged version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME ?? "";
          const errors = [];
          let expected = null;

          if (!tag) {
            errors.push("GITHUB_REF_NAME is missing.");
          } else if (!tag.startsWith("v")) {
            errors.push(`Tag name must start with v, got ${JSON.stringify(tag)}.`);
          } else {
            expected = tag.slice(1);
          }

          function readJsonVersion(file, label) {
            try {
              const data = JSON.parse(fs.readFileSync(file, "utf8"));
              if (typeof data.version !== "string" || data.version.trim() === "") {
                errors.push(`${label} is missing a non-empty string version.`);
                return null;
              }
              return data.version;
            } catch (error) {
              errors.push(`Failed to read ${label} from ${file}: ${error.message}`);
              return null;
            }
          }

          function readCargoVersion(file) {
            try {
              const cargoText = fs.readFileSync(file, "utf8");
              const cargoLines = cargoText.split(/\r?\n/);
              const packageHeaderIndex = cargoLines.findIndex((line) => line.trim() === "[package]");
              if (packageHeaderIndex < 0) {
                errors.push(`Could not find a [package] section in ${file}.`);
                return null;
              }
              let cargoVersion;
              for (const line of cargoLines.slice(packageHeaderIndex + 1)) {
                const trimmed = line.trim();
                if (trimmed && trimmed.startsWith("[") && trimmed.endsWith("]")) {
                  break;
                }
                const match = trimmed.match(/^version\s*=\s*"([^"]+)"\s*$/);
                if (match) {
                  cargoVersion = match[1];
                  break;
                }
              }
              if (!cargoVersion) {
                errors.push(`Could not find [package].version in ${file}.`);
                return null;
              }
              return cargoVersion;
            } catch (error) {
              errors.push(`Failed to read Cargo version from ${file}: ${error.message}`);
              return null;
            }
          }

          const versions = [
            ["package.json", readJsonVersion("package.json", "package.json")],
            ["src-tauri/Cargo.toml", readCargoVersion("src-tauri/Cargo.toml")],
            ["src-tauri/tauri.conf.json", readJsonVersion("src-tauri/tauri.conf.json", "src-tauri/tauri.conf.json")],
          ];

          if (expected !== null) {
            for (const [label, version] of versions) {
              if (version !== expected) {
                errors.push(`${label} version ${JSON.stringify(version)} does not match tag version ${JSON.stringify(expected)}.`);
              }
            }
          }

          if (errors.length > 0) {
            console.error("Release version validation failed:");
            for (const error of errors) {
              console.error(`- ${error}`);
            }
            process.exit(1);
          }

          console.log(`Release version verified: ${expected}.`);
          NODE

      - run: npm run tauri -- build --target aarch64-apple-darwin --bundles dmg

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - windows-x64
      - macos-arm64
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create draft release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' exes < <(find release-assets -type f -name '*.exe' -print0)
          mapfile -d '' dmgs < <(find release-assets -type f -name '*.dmg' -print0)

          if [ "${#exes[@]}" -ne 1 ]; then
            echo "Expected exactly one EXE installer, found ${#exes[@]}." >&2
            find release-assets -type f -name '*.exe' -print >&2
            exit 1
          fi

          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG installer, found ${#dmgs[@]}." >&2
            find release-assets -type f -name '*.dmg' -print >&2
            exit 1
          fi

          exe_file="${exes[0]}"
          dmg_file="${dmgs[0]}"

          if gh release view "$TAG_NAME" --json isDraft --jq .isDraft >/dev/null 2>&1; then
            if [ "$(gh release view "$TAG_NAME" --json isDraft --jq .isDraft)" != "true" ]; then
              echo "Release $TAG_NAME already exists and is published; refusing to overwrite it." >&2
              exit 1
            fi
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --draft \
              --title "愈心桌宠 $GITHUB_REF_NAME" \
              --notes "Temporary notes while CI uploads the desktop installers."
          fi

      - name: Upload installers and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' exes < <(find release-assets -type f -name '*.exe' -print0)
          mapfile -d '' dmgs < <(find release-assets -type f -name '*.dmg' -print0)

          if [ "${#exes[@]}" -ne 1 ]; then
            echo "Expected exactly one EXE installer, found ${#exes[@]}." >&2
            find release-assets -type f -name '*.exe' -print >&2
            exit 1
          fi

          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG installer, found ${#dmgs[@]}." >&2
            find release-assets -type f -name '*.dmg' -print >&2
            exit 1
          fi

          exe_file="${exes[0]}"
          dmg_file="${dmgs[0]}"

          if gh release view "$TAG_NAME" --json isDraft --jq .isDraft >/dev/null 2>&1; then
            if [ "$(gh release view "$TAG_NAME" --json isDraft --jq .isDraft)" != "true" ]; then
              echo "Release $TAG_NAME already exists and is published; refusing to overwrite it." >&2
              exit 1
            fi
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --draft \
              --title "愈心桌宠 $GITHUB_REF_NAME" \
              --notes "Temporary notes while CI uploads the desktop installers."
          fi

          gh release upload "$TAG_NAME" "$exe_file" "$dmg_file" --clobber

          notes_file="$RUNNER_TEMP/release-notes.md"
          cat > "$notes_file" <<'EOF'
          ## 安装包说明

          - Windows x64 安装包：`.exe`
          - Apple Silicon 安装包：`.dmg`，支持 M1 / M2 / M3 / M4 以及后续 ARM64 Mac

          ## 安装提示

          当前构建为未签名、未公证版本。首次启动时，如果 macOS 提示已阻止打开，请前往“系统设置 → 隐私与安全性”，点击“仍要打开”（Open Anyway）继续启动。

          ## 兼容性

          Intel Mac 不受支持。
          EOF

          gh release edit "$TAG_NAME" \
            --notes-file "$notes_file" \
            --draft=false \
            --latest
